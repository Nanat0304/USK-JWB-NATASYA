<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Favorite</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container mt-5">
    <h2 class="mb-4">❤️ Favorite Books</h2>

    <!-- GRID -->
    <div class="row" id="listFavorite"></div>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", function(){
    tampilData();
  });

  function tampilData(){
    let favorite = JSON.parse(localStorage.getItem("favorite")) || [];
    let container = document.getElementById("listFavorite");

    container.innerHTML = "";

    if(favorite.length === 0){
      container.innerHTML = "<p>Tidak ada favorite 😢</p>";
      return;
    }

    favorite.forEach((item, index) => {
      container.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card shadow h-100">

            <!-- GAMBAR -->
            <img src="${item.gambar}" class="card-img-top" style="height:200px; object-fit:cover;">

            <!-- ISI -->
            <div class="card-body">
              <p class="card-text">${item.judul}</p>
            </div>

            <!-- FOOTER -->
            <div class="card-footer d-flex justify-content-between align-items-center">
              <span class="text-danger fw-bold">${item.harga}</span>
              <button onclick="hapus(${index})" class="btn btn-danger btn-sm">Hapus</button>
            </div>

          </div>
        </div>
      `;
    });
  }

  function hapus(index){
    let favorite = JSON.parse(localStorage.getItem("favorite")) || [];

    favorite.splice(index, 1);

    localStorage.setItem("favorite", JSON.stringify(favorite));

    tampilData();
  }
  </script>

</body>
</html>
